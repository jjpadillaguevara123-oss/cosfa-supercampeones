{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>COSFA Supercampeones — Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="{% static 'core/css/cosfa-modern.css' %}" rel="stylesheet">
<style>
/* ── Login Enhanced Styles ── */
.login-bg { min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#0a1628 0%,#0d2142 40%,#091a36 100%); position:relative; overflow:hidden; }

/* Animated gradient orbs in background */
.login-orb { position:absolute; border-radius:50%; filter:blur(80px); opacity:.18; animation:orbFloat 8s ease-in-out infinite; pointer-events:none; }
.login-orb-1 { width:400px; height:400px; background:radial-gradient(circle,#1565C0,transparent); top:-100px; left:-100px; animation-delay:0s; }
.login-orb-2 { width:350px; height:350px; background:radial-gradient(circle,#FFC107,transparent); bottom:-80px; right:-80px; animation-delay:-3s; }
.login-orb-3 { width:250px; height:250px; background:radial-gradient(circle,#1976D2,transparent); top:50%; left:60%; animation-delay:-5s; }
@keyframes orbFloat { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(30px,-20px) scale(1.05)} 66%{transform:translate(-20px,30px) scale(.95)} }

/* Floating particles canvas */
#loginCanvas { position:absolute; inset:0; z-index:0; }

/* Cursor glow */
#cursorGlow { position:fixed; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle,rgba(21,101,192,.25),transparent 70%); pointer-events:none; transform:translate(-50%,-50%); z-index:0; transition:opacity .3s; }

/* Card */
.login-wrap { position:relative; z-index:2; width:100%; display:flex; align-items:center; justify-content:center; padding:2rem; }
.login-card {
  background:rgba(15,30,60,.85);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.1);
  border-radius:20px;
  padding:2.5rem 2.5rem 2rem;
  width:100%; max-width:380px;
  box-shadow:0 20px 60px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.05);
  animation:cardEntrance .7s cubic-bezier(.22,1,.36,1) both;
  transform-style:preserve-3d;
  transition:box-shadow .2s;
}
@keyframes cardEntrance { from{opacity:0;transform:translateY(40px) scale(.96)} to{opacity:1;transform:translateY(0) scale(1)} }

/* Logo bounce */
.logo-area { text-align:center; margin-bottom:1.5rem; }
.logo-circle { animation:logoBounce .8s cubic-bezier(.22,1,.36,1) .2s both; display:inline-block; }
@keyframes logoBounce { from{opacity:0;transform:scale(.6) translateY(-20px)} to{opacity:1;transform:scale(1) translateY(0)} }
.logo-title { font-family:'Bebas Neue',sans-serif; font-size:2rem; color:#fff; letter-spacing:3px; margin-top:.5rem; }
.logo-title .y { color:#FFC107; }
.logo-sub { font-size:.7rem; color:rgba(255,255,255,.4); letter-spacing:2px; text-transform:uppercase; }

/* Inputs with focus glow */
.login-label { display:block; font-size:.72rem; font-weight:600; color:rgba(255,255,255,.5); text-transform:uppercase; letter-spacing:1px; margin-bottom:.35rem; }
.login-input {
  width:100%; padding:.75rem 1rem; border-radius:10px;
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12);
  color:#fff; font-size:.9rem; outline:none; transition:all .2s;
  box-sizing:border-box;
}
.login-input::placeholder { color:rgba(255,255,255,.25); }
.login-input:focus {
  border-color:#1976D2;
  background:rgba(25,118,210,.15);
  box-shadow:0 0 0 3px rgba(25,118,210,.2);
}
.mb-3 { margin-bottom:1rem; }

/* Error */
.login-error { background:rgba(239,68,68,.15); border:1px solid rgba(239,68,68,.3); color:#fca5a5; border-radius:10px; padding:.65rem 1rem; font-size:.82rem; margin-bottom:1rem; display:flex; align-items:center; gap:.5rem; }

/* Submit button with shimmer */
.btn-login {
  width:100%; padding:.85rem; border-radius:12px; border:none;
  background:linear-gradient(135deg,#1565C0,#1976D2);
  color:#fff; font-size:.92rem; font-weight:700; cursor:pointer;
  letter-spacing:.5px; margin-top:.5rem;
  transition:all .2s; position:relative; overflow:hidden;
}
.btn-login::after {
  content:''; position:absolute; top:0; left:-100%; width:60%; height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);
  animation:shimmer 2.5s infinite .8s;
}
@keyframes shimmer { to{left:160%} }
.btn-login:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(21,101,192,.4); }
.btn-login:active { transform:translateY(0); }

.login-hint { text-align:center; font-size:.68rem; color:rgba(255,255,255,.2); margin-top:1.2rem; letter-spacing:1px; }
</style>
</head>
<body class="login-bg">
<!-- Animated orbs -->
<div class="login-orb login-orb-1"></div>
<div class="login-orb login-orb-2"></div>
<div class="login-orb login-orb-3"></div>

<!-- Particles canvas -->
<canvas id="loginCanvas"></canvas>

<!-- Cursor glow -->
<div id="cursorGlow"></div>

<div class="login-wrap fade-up">
  <div class="login-card" id="loginCard">
    <div class="logo-area">
      <div class="logo-circle" style="background:transparent;border:none;padding:0;display:flex;align-items:center;justify-content:center;"><img src="{% static 'core/img/cosfa_logo.png' %}" alt="COSFA" style="width:160px;height:160px;object-fit:contain;display:block;margin:0 auto;"></div>
      <div class="logo-title">COSFA <span class="y">SUPER</span></div>
      <div class="logo-sub">Sistema Escolar Supercampeones</div>
    </div>
    {% if error %}
    <div class="login-error">
      <i class="bi bi-exclamation-circle-fill"></i> {{ error }}
    </div>
    {% endif %}
    <form method="POST">
      {% csrf_token %}
      <div class="mb-3">
        <label class="login-label"><i class="bi bi-person-fill"></i> Usuario</label>
        <input type="text" name="username" class="login-input" placeholder="Ingresa tu usuario" required autofocus>
      </div>
      <div class="mb-3">
        <label class="login-label"><i class="bi bi-lock-fill"></i> Contraseña</label>
        <input type="password" name="password" class="login-input" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login">
        <i class="bi bi-box-arrow-in-right"></i> Ingresar al Sistema
      </button>
    </form>
    <div class="login-hint">Sistema exclusivo para la comunidad COSFA</div>
  </div>
</div>

<script>
/* ── Cursor glow follows mouse ── */
const glow = document.getElementById('cursorGlow');
document.addEventListener('mousemove', e => {
  glow.style.left = e.clientX + 'px';
  glow.style.top  = e.clientY + 'px';
});

/* ── 3D card tilt on mouse move ── */
const card = document.getElementById('loginCard');
card.addEventListener('mousemove', e => {
  const r = card.getBoundingClientRect();
  const x = (e.clientX - r.left) / r.width  - .5;
  const y = (e.clientY - r.top)  / r.height - .5;
  card.style.transform = `perspective(700px) rotateY(${x*10}deg) rotateX(${-y*8}deg) scale(1.02)`;
  card.style.boxShadow = `${-x*20}px ${-y*20}px 60px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.08)`;
});
card.addEventListener('mouseleave', () => {
  card.style.transform = '';
  card.style.boxShadow = '';
});

/* ── Floating particles ── */
const canvas = document.getElementById('loginCanvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [];
function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);

function Particle(){
  this.x = Math.random()*W; this.y = Math.random()*H;
  this.r = Math.random()*2+.5;
  this.dx = (Math.random()-.5)*.4; this.dy = (Math.random()-.5)*.4;
  this.a = Math.random()*.5+.1;
}
for(let i=0;i<80;i++) particles.push(new Particle());

function drawParticles(){
  ctx.clearRect(0,0,W,H);
  particles.forEach(p=>{
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle = `rgba(100,160,255,${p.a})`; ctx.fill();
    p.x += p.dx; p.y += p.dy;
    if(p.x<0||p.x>W) p.dx*=-1;
    if(p.y<0||p.y>H) p.dy*=-1;
  });
  // Draw connecting lines between nearby particles
  for(let i=0;i<particles.length;i++){
    for(let j=i+1;j<particles.length;j++){
      const dist = Math.hypot(particles[i].x-particles[j].x, particles[i].y-particles[j].y);
      if(dist<120){
        ctx.beginPath();
        ctx.moveTo(particles[i].x,particles[i].y);
        ctx.lineTo(particles[j].x,particles[j].y);
        ctx.strokeStyle=`rgba(100,160,255,${.08*(1-dist/120)})`;
        ctx.lineWidth=.5; ctx.stroke();
      }
    }
  }
  requestAnimationFrame(drawParticles);
}
drawParticles();
</script>
</body>
</html>
