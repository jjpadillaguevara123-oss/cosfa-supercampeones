{% extends 'core/base.html' %}{% block title %}Confirmar Eliminación{% endblock %}
{% block content %}
<div style="max-width:460px;margin:4rem auto;padding:1rem;">
  <div class="cosfa-card fade-up" style="text-align:center;padding:2.5rem;border-top:3px solid #dc2626;">
    <div style="width:64px;height:64px;border-radius:50%;background:rgba(220,38,38,.1);border:2px solid rgba(220,38,38,.2);display:flex;align-items:center;justify-content:center;margin:0 auto .9rem;">
      <i class="bi bi-exclamation-triangle-fill" style="font-size:1.8rem;color:#dc2626;"></i>
    </div>
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:.5rem;">Confirmar Eliminación</div>
    <p style="color:var(--muted);font-size:.88rem;margin-bottom:.3rem;">Vas a eliminar:</p>
    <p style="font-weight:700;font-size:1rem;margin-bottom:.5rem;">{{ objeto }}</p>
    <p style="color:var(--muted);font-size:.82rem;margin-bottom:1.75rem;">Esta acción no se puede deshacer.</p>
    <form method="POST" style="display:flex;gap:.65rem;justify-content:center;">
      {% csrf_token %}
      <button type="submit" class="btn-cosfa btn-cosfa-danger"><i class="bi bi-trash-fill"></i> Sí, eliminar</button>
      <a href="{% url volver %}" class="btn-cosfa btn-cosfa-secondary"><i class="bi bi-x-lg"></i> Cancelar</a>
    </form>
  </div>
</div>
{% endblock %}
